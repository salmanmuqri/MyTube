[build]
# Railway builds the backend image using the Dockerfile in ./backend
builder = "dockerfile"
dockerfilePath = "backend/Dockerfile.railway"

[deploy]
# Run migrations then boot gunicorn quickly for health checks.
# Keep worker count conservative for small Railway instances to avoid boot-time memory pressure.
startCommand = "python manage.py migrate --noinput && gunicorn core.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --threads 2 --timeout 1800"
healthcheckPath = "/api/health/"
# Give startup enough time for first-boot migrations and collectstatic before readiness probes fail.
healthcheckTimeout = 300
restartPolicyType = "on_failure"

[[volumes]]
mountPath = "/app/media"
name = "media-storage"

[[volumes]]
mountPath = "/app/staticfiles"
name = "static-storage"

[build]
# Railway builds the backend image using the Dockerfile in ./backend
builder = "dockerfile"
dockerfilePath = "backend/Dockerfile.railway"

[deploy]
# Boot gunicorn immediately for stable health checks on constrained instances.
# Run migrations manually (or in a separate one-off command) when schema changes.
startCommand = "gunicorn core.wsgi:application --bind 0.0.0.0:$PORT --workers 1 --threads 4 --timeout 1800 --access-logfile - --error-logfile -"
healthcheckPath = "/api/health/"
# Give startup enough time for first-boot migrations and collectstatic before readiness probes fail.
healthcheckTimeout = 300
restartPolicyType = "on_failure"

[[volumes]]
mountPath = "/app/media"
name = "media-storage"

[[volumes]]
mountPath = "/app/staticfiles"
name = "static-storage"
